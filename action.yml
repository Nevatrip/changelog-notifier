name: "Changelog Notifier"
description: "Notifies you in Telegram when there is a new release"
inputs:
  prefixes:
    description: "Prefixes to search for"
    required: false
    default: |-
      feat
      fix
      docs
      style
      refactor
      perf
      test
      chore
  token:
    description: "Telegram bot token"
    required: true
  chat_id:
    description: "Telegram chat id"
    required: true
  project_name:
    description: "Project name"
    required: false
  commits:
    description: "Commits"
    required: false
  yougile_api_key:
    description: "YouGile API key"
    required: true
  db_url:
    description: "ClickHouse URL (e.g., http://clickhouse:8123). If not provided, metrics are skipped."
    required: false
  db_user:
    description: "ClickHouse username"
    required: false
    default: "dora"
  db_password:
    description: "ClickHouse password"
    required: false
  db_database:
    description: "ClickHouse database name"
    required: false
    default: "dora"
  db_table:
    description: "ClickHouse table name for DORA metrics"
    required: false
    default: "dora_metrics"
  environment:
    description: "Deployment environment (used as metric label)"
    required: false
    default: "production"
  github_token:
    description: "GitHub token for API access (calculating lead times). If not provided, defaults to GITHUB_TOKEN environment variable."
    required: false
runs:
  using: "node20"
  main: "dist/index.js"
